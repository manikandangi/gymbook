name: Android Build

on:
  push:
    branches: ["main"]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      # ✅ Checkout
      - name: Checkout repo
        uses: actions/checkout@v4

      # ✅ Setup Node (with cache)
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: "npm"

      # ✅ Install dependencies (FAST)
      - name: Install dependencies
        run: npm ci --prefer-offline --no-audit --progress=false

      # ✅ Setup Java (REQUIRED for Expo SDK 54)
      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: "temurin"
          java-version: "17"

      # ✅ Setup Android SDK
      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      # ✅ Cache Gradle (HUGE speed boost)
      - name: Cache Gradle
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: ${{ runner.os }}-gradle-${{ hashFiles('android/**/*.gradle*', 'android/**/gradle-wrapper.properties') }}
          restore-keys: |
            ${{ runner.os }}-gradle-

      # ✅ Increase memory (prevents crashes)
      - name: Increase Gradle memory
        run: echo "org.gradle.jvmargs=-Xmx4g" >> android/gradle.properties

      # ✅ Build APK (OPTIMIZED)
      - name: Build APK
        run: |
          cd android
          chmod +x gradlew
          ./gradlew assembleRelease \
            --no-daemon \
            --parallel \
            --build-cache \
            -x lint \
            -x test

      # ✅ Upload APK
      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: app-release
          path: android/app/build/outputs/apk/release/app-release.apk