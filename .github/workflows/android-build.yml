name: Android Build

on:
  push:
    branches: ["main"]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      # ✅ Checkout
      - uses: actions/checkout@v4

      # ✅ Node setup (with cache)
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: "npm"

      # ✅ Install deps (FAST)
      - run: npm ci --prefer-offline --no-audit --progress=false

      # ✅ Java (REQUIRED)
      - uses: actions/setup-java@v4
        with:
          distribution: "temurin"
          java-version: "17"

      # ✅ Android SDK
      - uses: android-actions/setup-android@v3

      # ✅ Cache Expo prebuild (VERY IMPORTANT)
      - name: Cache Expo Prebuild
        uses: actions/cache@v4
        with:
          path: |
            android
            ios
          key: ${{ runner.os }}-expo-${{ hashFiles('package.json') }}
          restore-keys: |
            ${{ runner.os }}-expo-

      # ✅ Cache Gradle (BIGGEST BOOST)
      - name: Cache Gradle
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: ${{ runner.os }}-gradle-${{ hashFiles('android/**/*.gradle*') }}
          restore-keys: |
            ${{ runner.os }}-gradle-

      # ✅ Increase memory
      - run: echo "org.gradle.jvmargs=-Xmx4g" >> android/gradle.properties

      # ✅ Prebuild ONLY if needed
      - name: Expo Prebuild
        run: npx expo prebuild --platform android

      # ✅ Build APK
      - name: Build APK
        run: |
          cd android
          chmod +x gradlew
          ./gradlew assembleRelease \
            --no-daemon \
            --parallel \
            --build-cache \
            -x lint \
            -x test

      # ✅ Upload APK
      - uses: actions/upload-artifact@v4
        with:
          name: app-release
          path: android/app/build/outputs/apk/release/app-release.apk